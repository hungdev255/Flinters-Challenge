name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build and test
        run: mvn -B -ntp verify

      - name: Upload built jar
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: aggregator-jar
          path: target/aggregator.jar
          retention-days: 7

  docker:
    name: Docker image builds
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ad-aggregator:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test image (CLI usage error path)
        run: |
          # Running with no args must exit non-zero and print the usage line.
          # This proves the entrypoint, jar, and JRE base image all work
          # without needing the 1GB dataset on the runner.
          set +e
          docker run --rm ad-aggregator:ci 2>&1 | tee out.txt
          rc=${PIPESTATUS[0]}
          set -e
          grep -q "Usage: java -jar aggregator.jar" out.txt
          test "$rc" = "2"
